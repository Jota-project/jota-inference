name: C++ & Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential ninja-build ccache zlib1g-dev

    - name: Download Catch2 amalgamated
      run: |
        mkdir -p tests
        if [ ! -f tests/catch_amalgamated.hpp ]; then
            wget -q https://github.com/catchorg/Catch2/releases/download/v3.4.0/catch_amalgamated.hpp -O tests/catch_amalgamated.hpp
        fi
        if [ ! -f tests/catch_amalgamated.cpp ]; then
            wget -q https://github.com/catchorg/Catch2/releases/download/v3.4.0/catch_amalgamated.cpp -O tests/catch_amalgamated.cpp
        fi

    - name: Build (CPU-only, fast)
      run: ./build_fast.sh

    - name: Run unit tests
      run: ./build_fast/run_tests
